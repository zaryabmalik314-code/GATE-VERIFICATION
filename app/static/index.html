<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LGU Gate Verify</title>
  <link rel="manifest" href="manifest.json">
<style>
  :root {
    --ink: #10140f;
    --panel: #171d15;
    --panel-2: #1f271b;
    --line: #33402c;
    --olive: #4a5c34;
    --olive-bright: #7a9c4e;
    --gold: #d4af37;
    --allow: #4caf6b;
    --allow-dim: #1d3324;
    --deny: #e2543f;
    --deny-dim: #3a1c17;
    --text: #eef0e9;
    --text-dim: #9aa693;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--ink);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  body {
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 24px 16px 48px;
  }
  header {
    width: 100%; max-width: 480px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .crest {
    width: 42px; height: 42px; border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--gold);
    flex-shrink: 0;
    background: #fff;
  }
  .crest img { width: 100%; height: 100%; object-fit: cover; }
  header h1 {
    font-size: 18px; margin: 0; letter-spacing: 0.02em; line-height: 1.25;
  }
  header .sub {
    display: block; font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.12em; margin-top: 2px;
  }

  main {
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
  }

  .tabs {
    display: flex; gap: 6px; margin-bottom: 4px;
  }
  .tab {
    flex: 1; padding: 10px; text-align: center;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 8px; cursor: pointer; font-size: 13px;
    color: var(--text-dim); user-select: none;
  }
  .tab.active {
    background: var(--olive); color: #0e130b; font-weight: 600;
    border-color: var(--olive-bright);
  }

  video, #captured {
    width: 100%; border-radius: 8px; background: #000;
    display: block; border: 1px solid var(--line);
  }
  #captured { display: none; }

  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  button {
    font: inherit; cursor: pointer; border: none;
    border-radius: 8px; padding: 12px 14px; font-size: 14px; font-weight: 600;
    transition: opacity 0.15s ease;
  }
  button:active { opacity: 0.8; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary { background: var(--olive-bright); color: #0e130b; flex: 1; }
  .btn-secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); flex: 1; }
  .btn-full { width: 100%; }

  input[type="file"] { display: none; }

  label.field {
    display: block; font-size: 12px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  input[type="text"] {
    width: 100%; padding: 12px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--panel-2);
    color: var(--text); font-size: 15px; margin-bottom: 12px;
  }
  input[type="text"]:focus { outline: 2px solid var(--olive-bright); border-color: transparent; }

  .hidden { display: none !important; }

  /* Camera alignment guide */
  .video-wrap {
    position: relative;
    width: 100%;
    line-height: 0; /* remove inline-video baseline gap */
    overflow: hidden;
    border-radius: 8px;
  }
  .card-guide {
    position: absolute;
    left: 34%; top: 6%;
    width: 32%; height: 88%;
    border: 2px dashed var(--gold);
    border-radius: 10px;
    pointer-events: none;
    box-shadow: 0 0 0 999px rgba(0,0,0,0.35);
  }
  .card-guide::before {
    content: 'Align card here';
    position: absolute;
    top: -24px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--gold);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .card-guide .corner {
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--olive-bright);
    border-style: solid;
    border-width: 0;
  }
  .card-guide .corner.tl { top: -2px; left: -2px; border-top-width: 3px; border-left-width: 3px; border-top-left-radius: 8px; }
  .card-guide .corner.tr { top: -2px; right: -2px; border-top-width: 3px; border-right-width: 3px; border-top-right-radius: 8px; }
  .card-guide .corner.bl { bottom: -2px; left: -2px; border-bottom-width: 3px; border-left-width: 3px; border-bottom-left-radius: 8px; }
  .card-guide .corner.br { bottom: -2px; right: -2px; border-bottom-width: 3px; border-right-width: 3px; border-bottom-right-radius: 8px; }

  /* Result card */
  .result {
    border-radius: var(--radius);
    padding: 22px;
    text-align: center;
    border: 1px solid var(--line);
  }
  .result.allow { background: var(--allow-dim); border-color: var(--allow); }
  .result.deny { background: var(--deny-dim); border-color: var(--deny); }
  .result .verdict {
    font-size: 26px; font-weight: 800; letter-spacing: 0.02em; margin-bottom: 4px;
  }
  .result.allow .verdict { color: var(--allow); }
  .result.deny .verdict { color: var(--deny); }
  .result .roll { font-size: 15px; color: var(--text); margin-bottom: 6px; font-family: monospace; }
  .result .detail { font-size: 13px; color: var(--text-dim); }

  .status-msg {
    font-size: 13px; color: var(--text-dim); text-align: center; padding: 10px 0;
  }
  .status-msg.error { color: var(--deny); }

  .spinner {
    width: 20px; height: 20px; border-radius: 50%;
    border: 3px solid var(--line); border-top-color: var(--olive-bright);
    animation: spin 0.8s linear infinite; margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    margin-top: 24px; font-size: 11px; color: var(--text-dim); text-align: center;
  }
  footer a { color: var(--olive-bright); }
</style>
</head>
<body>

<header>
  <div class="crest"><img src="lgu-logo.jpg" alt="LGU Logo" /></div>
  <div>
    <h1>Gate Verify</h1>
    <span class="sub">Lahore Garrison University</span>
  </div>
</header>

<main>

  <div class="panel">
    <div class="tabs">
      <div class="tab active" id="tabScan">Scan Card</div>
      <div class="tab" id="tabManual">Type Roll No.</div>
    </div>

    <!-- SCAN MODE -->
    <div id="scanMode">
      <div class="video-wrap" id="videoWrap">
        <video id="video" autoplay playsinline></video>
        <div class="card-guide" id="cardGuide">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
        </div>
      </div>
      <img id="captured" alt="Captured card" />
      <div class="btn-row">
        <button class="btn-primary btn-full" id="captureBtn">Capture</button>
      </div>
      <div class="btn-row hidden" id="confirmRow">
        <button class="btn-secondary" id="retakeBtn">Retake</button>
        <button class="btn-primary" id="verifyScanBtn">Verify</button>
      </div>
    </div>

    <!-- MANUAL MODE -->
    <div id="manualMode" class="hidden">
      <label class="field">Roll Number</label>
      <input type="text" id="manualRoll" placeholder="Fa-2025-BS CMAI-055" />
      <label class="field">Session End Year (optional)</label>
      <input type="text" id="manualSession" placeholder="e.g. 2029" />
      <button class="btn-primary btn-full" id="verifyManualBtn">Verify</button>
    </div>
  </div>

  <div id="spinnerBox" class="status-msg"></div>
  <div id="statusMsg" class="status-msg"></div>
  <div id="resultBox"></div>

</main>

<footer>Guard fallback: use "Type Roll No." if the camera can't read the card.</footer>

<script>
const video = document.getElementById('video');
const captured = document.getElementById('captured');
const captureBtn = document.getElementById('captureBtn');
const confirmRow = document.getElementById('confirmRow');
const retakeBtn = document.getElementById('retakeBtn');
const verifyScanBtn = document.getElementById('verifyScanBtn');
const statusMsg = document.getElementById('statusMsg');
const spinnerBox = document.getElementById('spinnerBox');
const resultBox = document.getElementById('resultBox');

const tabScan = document.getElementById('tabScan');
const tabManual = document.getElementById('tabManual');
const scanMode = document.getElementById('scanMode');
const manualMode = document.getElementById('manualMode');

let stream = null;
let capturedBlob = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
  } catch (e) {
    statusMsg.textContent = 'Camera unavailable — use "Type Roll No." instead.';
    statusMsg.className = 'status-msg error';
  }
}
startCamera();

tabScan.onclick = () => {
  tabScan.classList.add('active');
  tabManual.classList.remove('active');
  scanMode.classList.remove('hidden');
  manualMode.classList.add('hidden');
};
tabManual.onclick = () => {
  tabManual.classList.add('active');
  tabScan.classList.remove('active');
  manualMode.classList.remove('hidden');
  scanMode.classList.add('hidden');
};

// Guide box is computed dynamically to match the real ID card's aspect
// ratio (portrait, ~0.633 width/height), scaled to whatever camera
// resolution/orientation the guard's device happens to have.
const CARD_ASPECT = 0.633; // width / height of the LGU card
const GUIDE_HEIGHT_FRAC = 0.88; // how tall the guide box is, as a fraction of video height
const GUIDE_PADDING = 0.04; // small safety margin around the guide box when cropping

const cardGuide = document.getElementById('cardGuide');
let GUIDE = { left: 0.34, top: 0.06, width: 0.32, height: 0.88 }; // fallback until video loads

function updateGuideOverlay() {
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) return;

  let guideHeightPx = GUIDE_HEIGHT_FRAC * vh;
  let guideWidthPx = guideHeightPx * CARD_ASPECT;

  // Don't let the guide exceed the frame width (e.g. on a portrait phone camera)
  const maxWidthPx = vw * 0.92;
  if (guideWidthPx > maxWidthPx) {
    guideWidthPx = maxWidthPx;
    guideHeightPx = guideWidthPx / CARD_ASPECT;
  }

  const widthFrac = guideWidthPx / vw;
  const heightFrac = guideHeightPx / vh;
  const leftFrac = (1 - widthFrac) / 2;
  const topFrac = (1 - heightFrac) / 2;

  GUIDE = { left: leftFrac, top: topFrac, width: widthFrac, height: heightFrac };

  cardGuide.style.left = (leftFrac * 100) + '%';
  cardGuide.style.top = (topFrac * 100) + '%';
  cardGuide.style.width = (widthFrac * 100) + '%';
  cardGuide.style.height = (heightFrac * 100) + '%';
}

video.addEventListener('loadedmetadata', updateGuideOverlay);

captureBtn.onclick = () => {
  const vw = video.videoWidth;
  const vh = video.videoHeight;

  // Compute crop region in the video's native pixel coordinates
  const padX = GUIDE.width * vw * GUIDE_PADDING;
  const padY = GUIDE.height * vh * GUIDE_PADDING;
  const cropX = Math.max(0, GUIDE.left * vw - padX);
  const cropY = Math.max(0, GUIDE.top * vh - padY);
  const cropW = Math.min(vw - cropX, GUIDE.width * vw + padX * 2);
  const cropH = Math.min(vh - cropY, GUIDE.height * vh + padY * 2);

  const canvas = document.createElement('canvas');
  canvas.width = cropW;
  canvas.height = cropH;
  canvas.getContext('2d').drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

  canvas.toBlob((blob) => {
    capturedBlob = blob;
    showCaptured(canvas.toDataURL());
  }, 'image/jpeg', 0.92);
};

function showCaptured(src) {
  video.style.display = 'none';
  captured.src = src;
  captured.style.display = 'block';
  confirmRow.classList.remove('hidden');
  captureBtn.parentElement.classList.add('hidden');
}

retakeBtn.onclick = () => {
  video.style.display = 'block';
  captured.style.display = 'none';
  confirmRow.classList.add('hidden');
  captureBtn.parentElement.classList.remove('hidden');
  capturedBlob = null;
  resultBox.innerHTML = '';
  statusMsg.textContent = '';
};

verifyScanBtn.onclick = async () => {
  if (!capturedBlob) return;
  setLoading(true);
  try {
    const formData = new FormData();
    formData.append('file', capturedBlob, 'card.jpg');
    const res = await fetch('/verify/scan', { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) {
      showStatusError(data.detail || 'Could not read the card. Try again or use manual entry.');
      return;
    }
    renderResult(data);
  } catch (e) {
    showStatusError('Network error — check connection and try again.');
  } finally {
    setLoading(false);
  }
};

document.getElementById('verifyManualBtn').onclick = async () => {
  const roll = document.getElementById('manualRoll').value.trim();
  const session = document.getElementById('manualSession').value.trim();
  if (!roll) {
    showStatusError('Enter a roll number.');
    return;
  }
  setLoading(true);
  try {
    const res = await fetch('/verify/manual', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        roll_number: roll,
        session_end_year: session ? parseInt(session, 10) : null
      })
    });
    const data = await res.json();
    if (!res.ok) {
      showStatusError(data.detail || 'Verification failed.');
      return;
    }
    renderResult(data);
  } catch (e) {
    showStatusError('Network error — check connection and try again.');
  } finally {
    setLoading(false);
  }
};

function setLoading(loading) {
  spinnerBox.innerHTML = loading ? '<div class="spinner"></div>' : '';
  if (loading) {
    // starting a fresh attempt - clear any leftover error/result from last time
    statusMsg.className = 'status-msg';
    statusMsg.textContent = '';
  }
  verifyScanBtn.disabled = loading;
  document.getElementById('verifyManualBtn').disabled = loading;
}

function showStatusError(msg) {
  statusMsg.className = 'status-msg error';
  statusMsg.textContent = msg;
  resultBox.innerHTML = '';
}

function renderResult(data) {
  statusMsg.textContent = '';
  const cls = data.allowed ? 'allow' : 'deny';
  const verdict = data.allowed ? 'ALLOWED' : 'NOT ALLOWED';
  resultBox.innerHTML = `
    <div class="result ${cls}">
      <div class="verdict">${verdict}</div>
      <div class="roll">${escapeHtml(data.roll_number)}</div>
      <div class="detail">${escapeHtml(data.detail || '')}</div>
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>

</body>
</html>
